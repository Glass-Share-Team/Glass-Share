# اسم نظام الاختبار
name: Android CI

# متى يعمل هذا النظام؟
on:
  push:
    # عند رفع أي كود إلى فرع التطوير
    branches: [ "develop" ]
  pull_request:
    # عند طلب دمج كود إلى الفرع الرئيسي أو التطوير
    branches: [ "main", "develop" ]

jobs:
  unit-tests:
    name: Run Unit Tests
    # بيئة التشغيل على خوادم GitHub (نظام لينكس)
    runs-on: ubuntu-latest
    steps:
      # الخطوة 1: سحب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # الخطوة 2: إعداد بيئة Java 17 المتوافقة مع أندرويد
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # الخطوة 3: إعطاء صلاحيات التشغيل لملف Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # الخطوة 4: تشغيل الاختبارات الأساسية لضمان سلامة الكود
      - name: Run Unit Tests
        run: ./gradlew test